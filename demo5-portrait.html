<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 5 – Transit Signing (Portrait)</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .slide { width: 480px; padding: 36px 32px 40px; }
  .slide-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 700;
    letter-spacing: .14em; text-transform: uppercase;
    color: #3db4f5; margin-bottom: 32px;
  }
  .diagram { position: relative; width: 100%; height: 580px; }
  .node {
    position: absolute; display: flex; flex-direction: column;
    align-items: center; gap: 6px; transform: translate(-50%, -50%);
  }
  .node-box {
    padding: 14px 24px; border-radius: 10px; font-size: 16px;
    font-weight: 700; border: 2px solid; white-space: nowrap;
  }
  .node-sub {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    font-weight: 500; letter-spacing: .08em; opacity: .55; text-transform: uppercase;
  }
  /* Vertical: CI top, Bao middle, End User bottom */
  .node.ci { top: 10%; left: 50%; }
  .node.ci .node-box { color: #3db4f5; border-color: rgba(61,180,245,.5); background: rgba(61,180,245,.08); }
  .node.bao { top: 42%; left: 50%; }
  .node.bao .node-box { color: #f5a943; border-color: rgba(245,169,67,.5); background: rgba(245,169,67,.08); }
  .node.bao .node-sub { color: #f5a943; }
  .node.enduser { top: 78%; left: 50%; }
  .node.enduser .node-box { color: #2ecc7a; border-color: rgba(46,204,122,.5); background: rgba(46,204,122,.08); }
  .node.enduser .node-sub { color: #2ecc7a; }
  svg.arrows { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
  .badge {
    position: absolute; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; background: #0d1117;
    padding: 4px 14px; border-radius: 99px; white-space: nowrap; z-index: 10;
  }
  .badge.key {
    top: 35%; left: 50%; transform: translate(-50%, -50%);
    color: rgba(245,169,67,.55); border: 1.5px solid rgba(245,169,67,.25);
    font-size: 10px;
  }
  .badge.valid {
    top: 94%; left: 28%; transform: translate(-50%, -50%);
    color: rgba(46,204,122,.8); border: 1.5px solid rgba(46,204,122,.35);
  }
  .badge.tamper {
    top: 94%; left: 72%; transform: translate(-50%, -50%);
    color: rgba(224,92,92,.8); border: 1.5px solid rgba(224,92,92,.35);
  }
  .lane-divider {
    position: absolute; top: 58%; left: 5%; width: 90%;
    border-top: 1.5px dashed rgba(255,255,255,.12);
  }
  .lane-label {
    position: absolute; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: rgba(255,255,255,.2);
  }
  .lane-label.sign { top: 4%; left: 5%; }
  .lane-label.verify { top: 60%; left: 5%; }
</style>
</head>
<body>
<div class="slide">
  <div class="slide-title">Demo 5 · Transit Binary Signing</div>
  <div class="diagram">
    <div class="lane-divider"></div>
    <div class="lane-label sign">Sign</div>
    <div class="lane-label verify">Verify</div>

    <svg class="arrows" viewBox="0 0 480 580" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-blue" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L9,3 z" fill="rgba(61,180,245,.5)"/></marker>
        <marker id="arr-orange" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L9,3 z" fill="rgba(245,169,67,.6)"/></marker>
        <marker id="arr-green" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L9,3 z" fill="rgba(46,204,122,.6)"/></marker>
        <filter id="lbg" x="-20%" y="-40%" width="140%" height="180%">
          <feFlood flood-color="#0d1117" result="bg"/>
          <feMerge><feMergeNode in="bg"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- CI → SHA-256 → Bao (left side, outside boxes) -->
      <line x1="155" y1="85" x2="155" y2="215"
            stroke="rgba(61,180,245,.4)" stroke-width="2" marker-end="url(#arr-blue)"/>
      <text x="118" y="152" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="13" fill="rgba(61,180,245,.5)" transform="rotate(-90, 118, 152)" filter="url(#lbg)">SHA-256</text>

      <!-- Bao → signature → CI (right side, outside boxes) -->
      <line x1="325" y1="215" x2="325" y2="85"
            stroke="rgba(245,169,67,.5)" stroke-width="2" marker-end="url(#arr-orange)"/>
      <text x="362" y="152" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="13" fill="rgba(245,169,67,.5)" transform="rotate(90, 362, 152)" filter="url(#lbg)">signature</text>

      <!-- CI → binary+sig → End User (left arc) -->
      <path d="M 170 85 Q 55 290 170 425"
            stroke="rgba(46,204,122,.4)" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>
      <text x="70" y="275" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="12" fill="rgba(46,204,122,.45)" transform="rotate(-90, 70, 275)" filter="url(#lbg)">binary + sig</text>

      <!-- End User → verify → Bao (right arc, dashed) -->
      <path d="M 310 425 Q 420 320 310 270"
            stroke="rgba(46,204,122,.35)" stroke-width="2" fill="none" stroke-dasharray="6 5" marker-end="url(#arr-green)"/>
      <text x="400" y="350" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="12" fill="rgba(46,204,122,.4)" transform="rotate(90, 400, 350)" filter="url(#lbg)">verify</text>
    </svg>

    <div class="node ci">
      <div class="node-box">CI Runner</div>
    </div>
    <div class="node bao">
      <div class="node-box">OpenBao</div>
      <span class="node-sub">Transit</span>
    </div>
    <div class="node enduser">
      <div class="node-box">End User</div>
    </div>
    <div class="badge key">Key never leaves</div>
    <div class="badge valid">✓ Valid</div>
    <div class="badge tamper">✕ Tampered</div>
  </div>
</div>
</body>
</html>
