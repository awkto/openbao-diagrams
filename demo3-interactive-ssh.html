<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 3 – Interactive SSH Access</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }

  .slide {
    width: 960px;
    padding: 44px 56px 52px;
  }

  .slide-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #3db4f5;
    margin-bottom: 40px;
  }

  .diagram {
    position: relative;
    width: 100%;
    height: 520px;
  }

  .node {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transform: translate(-50%, -50%);
  }

  .node-box {
    padding: 16px 30px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    border: 2px solid;
    white-space: nowrap;
    text-align: center;
  }

  .node-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    opacity: .55;
    text-transform: uppercase;
  }

  /* Vertical layout: User top-left, Bao top-right, Host bottom-center */
  .node.user { top: 14%; left: 25%; }
  .node.user .node-box { color: #c084fc; border-color: rgba(192,132,252,.5); background: rgba(192,132,252,.08); }
  .node.user .node-sub { color: #c084fc; }

  .node.bao { top: 14%; left: 75%; }
  .node.bao .node-box { color: #f5a943; border-color: rgba(245,169,67,.5); background: rgba(245,169,67,.08); }
  .node.bao .node-sub { color: #f5a943; }

  .node.host { top: 72%; left: 50%; }
  .node.host .node-box { color: #2ecc7a; border-color: rgba(46,204,122,.5); background: rgba(46,204,122,.08); }
  .node.host .node-sub { color: #2ecc7a; }

  svg.arrows {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .badge {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    background: #0d1117;
    padding: 5px 16px;
    border-radius: 99px;
    white-space: nowrap;
    z-index: 10;
  }

  .badge.expire {
    top: 92%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(224,92,92,.8);
    border: 1.5px solid rgba(224,92,92,.35);
  }

  .badge.same-ca {
    top: 46%;
    left: 80%;
    transform: translate(-50%, -50%);
    color: rgba(245,169,67,.5);
    border: 1.5px solid rgba(245,169,67,.2);
    font-size: 11px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="slide-title">Demo 3 · Interactive SSH Access to Hosts</div>
  <div class="diagram">

    <svg class="arrows" viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-purple" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(192,132,252,.5)"/>
        </marker>
        <marker id="arr-orange" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(245,169,67,.6)"/>
        </marker>
        <marker id="arr-green" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(46,204,122,.6)"/>
        </marker>
        <filter id="lbg" x="-20%" y="-40%" width="140%" height="180%">
          <feFlood flood-color="#0d1117" result="bg"/>
          <feMerge><feMergeNode in="bg"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- 1. User → sign my pubkey → Bao -->
      <line x1="320" y1="60" x2="630" y2="60"
            stroke="rgba(192,132,252,.4)" stroke-width="2" marker-end="url(#arr-purple)"/>
      <text x="480" y="48" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(192,132,252,.55)" filter="url(#lbg)">sign my pubkey</text>

      <!-- 2. Bao → signed cert → User -->
      <line x1="630" y1="88" x2="320" y2="88"
            stroke="rgba(245,169,67,.5)" stroke-width="2" marker-end="url(#arr-orange)"/>
      <text x="480" y="110" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(245,169,67,.55)" filter="url(#lbg)">signed cert</text>

      <!-- 3. User → SSH with cert → Host (diagonal down) -->
      <line x1="240" y1="110" x2="440" y2="345"
            stroke="rgba(46,204,122,.5)" stroke-width="2" marker-end="url(#arr-green)"/>
      <text x="300" y="255" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(46,204,122,.55)" transform="rotate(-50, 300, 255)" filter="url(#lbg)">SSH with cert</text>

      <!-- 4. Bao CA trust → Host (diagonal down, dashed) -->
      <line x1="720" y1="110" x2="525" y2="345"
            stroke="rgba(245,169,67,.3)" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#arr-orange)"/>
      <text x="660" y="250" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="13" fill="rgba(245,169,67,.4)" transform="rotate(50, 660, 250)" filter="url(#lbg)">TrustedUserCAKeys</text>

      <!-- Expire divider -->
      <line x1="80" y1="440" x2="880" y2="440"
            stroke="rgba(224,92,92,.2)" stroke-width="1" stroke-dasharray="4 6"/>

      <!-- 5. Blocked SSH after expiry -->
      <line x1="240" y1="120" x2="435" y2="355"
            stroke="rgba(224,92,92,.2)" stroke-width="2" stroke-dasharray="4 5"/>
      <text x="310" y="270" text-anchor="middle" font-family="Inter, sans-serif"
            font-size="22" fill="rgba(224,92,92,.6)" filter="url(#lbg)">✕</text>

      <!-- Step numbers -->
      <text x="480" y="35" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="12" fill="rgba(192,132,252,.3)" letter-spacing="1">① REQUEST</text>
      <text x="480" y="128" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="12" fill="rgba(245,169,67,.3)" letter-spacing="1">② CERT ISSUED</text>
    </svg>

    <div class="node user">
      <div class="node-box">User</div>
      <span class="node-sub">Interactive Shell</span>
    </div>

    <div class="node bao">
      <div class="node-box">OpenBao</div>
      <span class="node-sub">SSH CA Engine</span>
    </div>

    <div class="node host">
      <div class="node-box">Target Host</div>
      <span class="node-sub">sshd</span>
    </div>

    <div class="badge same-ca">Same CA as Demo 1</div>
    <div class="badge expire">⏱ Cert Expires · 5 min</div>

  </div>
</div>
</body>
</html>
