<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 4 – PKI Engine &amp; ACME Certificates</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }

  .slide {
    width: 960px;
    padding: 44px 56px 52px;
  }

  .slide-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #3db4f5;
    margin-bottom: 40px;
  }

  .diagram {
    position: relative;
    width: 100%;
    height: 520px;
  }

  .node {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transform: translate(-50%, -50%);
  }

  .node-box {
    padding: 16px 30px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    border: 2px solid;
    white-space: nowrap;
    text-align: center;
  }

  .node-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    opacity: .55;
    text-transform: uppercase;
  }

  /* Diamond layout: Root top, Bao center, acme.sh left, Web right */
  .node.root { top: 10%; left: 50%; }
  .node.root .node-box { color: rgba(245,169,67,.6); border-color: rgba(245,169,67,.3); background: rgba(245,169,67,.04); font-size: 15px; padding: 12px 24px; }
  .node.root .node-sub { color: rgba(245,169,67,.4); }

  .node.bao { top: 42%; left: 50%; }
  .node.bao .node-box { color: #f5a943; border-color: rgba(245,169,67,.5); background: rgba(245,169,67,.08); }
  .node.bao .node-sub { color: #f5a943; }

  .node.acme { top: 75%; left: 15%; }
  .node.acme .node-box { color: #3db4f5; border-color: rgba(61,180,245,.5); background: rgba(61,180,245,.08); }
  .node.acme .node-sub { color: #3db4f5; }

  .node.web { top: 75%; left: 85%; }
  .node.web .node-box { color: #2ecc7a; border-color: rgba(46,204,122,.5); background: rgba(46,204,122,.08); }
  .node.web .node-sub { color: #2ecc7a; }

  svg.arrows {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .badge {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    background: #0d1117;
    padding: 5px 16px;
    border-radius: 99px;
    white-space: nowrap;
    z-index: 10;
  }

  .badge.tls {
    top: 93%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(46,204,122,.8);
    border: 1.5px solid rgba(46,204,122,.35);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="slide-title">Demo 4 · PKI Engine &amp; ACME Certificates</div>
  <div class="diagram">

    <svg class="arrows" viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-orange" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(245,169,67,.6)"/>
        </marker>
        <marker id="arr-blue" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(61,180,245,.5)"/>
        </marker>
        <marker id="arr-green" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(46,204,122,.6)"/>
        </marker>
        <filter id="lbg" x="-20%" y="-40%" width="140%" height="180%">
          <feFlood flood-color="#0d1117" result="bg"/>
          <feMerge><feMergeNode in="bg"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Root CA → Intermediate CA chain -->
      <line x1="480" y1="82" x2="480" y2="190"
            stroke="rgba(245,169,67,.3)" stroke-width="2" stroke-dasharray="5 4"/>
      <text x="540" y="140" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="13" fill="rgba(245,169,67,.35)" filter="url(#lbg)">signs</text>

      <!-- acme.sh → ACME challenge → Bao (diagonal up-right) -->
      <line x1="210" y1="365" x2="415" y2="240"
            stroke="rgba(61,180,245,.4)" stroke-width="2" marker-end="url(#arr-blue)"/>
      <text x="270" y="280" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(61,180,245,.5)" transform="rotate(-45, 270, 280)" filter="url(#lbg)">ACME challenge</text>

      <!-- Bao → signed TLS cert → acme.sh (parallel return) -->
      <line x1="420" y1="258" x2="220" y2="375"
            stroke="rgba(245,169,67,.5)" stroke-width="2" marker-end="url(#arr-orange)"/>
      <text x="365" y="340" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(245,169,67,.5)" transform="rotate(-45, 365, 340)" filter="url(#lbg)">TLS cert</text>

      <!-- acme.sh → install cert → Web Server (horizontal bottom) -->
      <line x1="240" y1="395" x2="740" y2="395"
            stroke="rgba(46,204,122,.4)" stroke-width="2" marker-end="url(#arr-green)"/>
      <text x="480" y="383" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(46,204,122,.5)" filter="url(#lbg)">install cert</text>

      <!-- Step numbers -->
      <text x="280" y="260" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="12" fill="rgba(61,180,245,.3)" letter-spacing="1" filter="url(#lbg)">①</text>
      <text x="350" y="355" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="12" fill="rgba(245,169,67,.3)" letter-spacing="1" filter="url(#lbg)">②</text>
      <text x="480" y="420" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="12" fill="rgba(46,204,122,.3)" letter-spacing="1" filter="url(#lbg)">③</text>
    </svg>

    <div class="node root">
      <div class="node-box">Root CA</div>
    </div>

    <div class="node bao">
      <div class="node-box">OpenBao</div>
      <span class="node-sub">Intermediate CA · PKI Engine</span>
    </div>

    <div class="node acme">
      <div class="node-box">acme.sh</div>
      <span class="node-sub">ACME Client</span>
    </div>

    <div class="node web">
      <div class="node-box">Web Server</div>
      <span class="node-sub">acme-demo.sdemo.tux42.au</span>
    </div>

    <div class="badge tls">Self-Signed → CA-Signed</div>

  </div>
</div>
</body>
</html>
