<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 1 – CI/CD Deployment with SSH Certificates</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }

  .slide {
    width: 960px;
    padding: 44px 56px 52px;
  }

  .slide-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #3db4f5;
    margin-bottom: 40px;
  }

  .diagram {
    position: relative;
    width: 100%;
    height: 500px;
  }

  .node {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transform: translate(-50%, -50%);
  }

  .node-box {
    padding: 16px 30px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    border: 2px solid;
    white-space: nowrap;
    text-align: center;
  }

  .node-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    opacity: .55;
    text-transform: uppercase;
  }

  /* Horizontal pipeline: left → center → right */
  .node.ci { top: 40%; left: 12%; }
  .node.ci .node-box { color: #3db4f5; border-color: rgba(61,180,245,.5); background: rgba(61,180,245,.08); }
  .node.ci .node-sub { color: #3db4f5; }

  .node.bao { top: 40%; left: 50%; }
  .node.bao .node-box { color: #f5a943; border-color: rgba(245,169,67,.5); background: rgba(245,169,67,.08); }
  .node.bao .node-sub { color: #f5a943; }

  .node.host { top: 40%; left: 88%; }
  .node.host .node-box { color: #2ecc7a; border-color: rgba(46,204,122,.5); background: rgba(46,204,122,.08); }
  .node.host .node-sub { color: #2ecc7a; }

  svg.arrows {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .badge {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    background: #0d1117;
    padding: 5px 16px;
    border-radius: 99px;
    white-space: nowrap;
    z-index: 10;
  }

  .badge.expire {
    top: 88%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(224,92,92,.8);
    border: 1.5px solid rgba(224,92,92,.35);
  }

  .badge.no-keys {
    top: 12%;
    left: 12%;
    transform: translate(-50%, -50%);
    color: rgba(46,204,122,.7);
    border: 1.5px solid rgba(46,204,122,.3);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="slide-title">Demo 1 · CI/CD Deployment with SSH Certificates</div>
  <div class="diagram">

    <svg class="arrows" viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-blue" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(61,180,245,.5)"/>
        </marker>
        <marker id="arr-orange" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(245,169,67,.6)"/>
        </marker>
        <marker id="arr-green" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(46,204,122,.6)"/>
        </marker>
        <filter id="lbg" x="-20%" y="-40%" width="140%" height="180%">
          <feFlood flood-color="#0d1117" result="bg"/>
          <feMerge><feMergeNode in="bg"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Step numbers -->
      <text x="305" y="150" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="13" fill="rgba(61,180,245,.35)" letter-spacing="1" filter="url(#lbg)">①</text>
      <text x="710" y="150" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="13" fill="rgba(46,204,122,.35)" letter-spacing="1" filter="url(#lbg)">③</text>

      <!-- 1. CI → AppRole login → Bao (top arc) -->
      <path d="M 175 175 Q 305 110 430 175"
            stroke="rgba(61,180,245,.4)" stroke-width="2" fill="none" marker-end="url(#arr-blue)"/>
      <text x="305" y="135" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(61,180,245,.6)" filter="url(#lbg)">AppRole login</text>

      <!-- 2. Bao → signed cert → CI (bottom arc) -->
      <path d="M 430 225 Q 305 290 175 225"
            stroke="rgba(245,169,67,.5)" stroke-width="2" fill="none" marker-end="url(#arr-orange)"/>
      <text x="305" y="280" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(245,169,67,.55)" filter="url(#lbg)">signed SSH cert</text>

      <!-- 3. CI → deploy via cert → Host (long bottom arc) -->
      <path d="M 175 240 Q 480 420 830 240"
            stroke="rgba(46,204,122,.4)" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>
      <text x="490" y="380" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(46,204,122,.5)" filter="url(#lbg)">deploy via cert</text>

      <!-- 4. Bao → TrustedUserCAKeys → Host (top arc) -->
      <path d="M 560 175 Q 710 110 830 175"
            stroke="rgba(245,169,67,.3)" stroke-width="1.5" fill="none" stroke-dasharray="6 5" marker-end="url(#arr-orange)"/>
      <text x="710" y="130" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="13" fill="rgba(245,169,67,.4)" filter="url(#lbg)">TrustedUserCAKeys</text>

    </svg>

    <div class="node ci">
      <div class="node-box">GitLab CI/CD</div>
      <span class="node-sub">Pipeline Runner</span>
    </div>

    <div class="node bao">
      <div class="node-box">OpenBao</div>
      <span class="node-sub">SSH CA Engine</span>
    </div>

    <div class="node host">
      <div class="node-box">Target Host</div>
      <span class="node-sub">sshd</span>
    </div>

    <div class="badge no-keys">No static SSH keys</div>
    <div class="badge expire">⏱ Cert Expires · 30 min</div>

  </div>
</div>
</body>
</html>
