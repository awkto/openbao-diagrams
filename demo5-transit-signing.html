<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 5 – Transit Engine: Binary Signing</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }

  .slide {
    width: 960px;
    padding: 44px 56px 52px;
  }

  .slide-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #3db4f5;
    margin-bottom: 40px;
  }

  .diagram {
    position: relative;
    width: 100%;
    height: 520px;
  }

  .node {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transform: translate(-50%, -50%);
  }

  .node-box {
    padding: 16px 30px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    border: 2px solid;
    white-space: nowrap;
    text-align: center;
  }

  .node-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    opacity: .55;
    text-transform: uppercase;
  }

  /* Two-lane: CI top-left, Bao right-center, End User bottom-left */
  .node.ci { top: 20%; left: 18%; }
  .node.ci .node-box { color: #3db4f5; border-color: rgba(61,180,245,.5); background: rgba(61,180,245,.08); }
  .node.ci .node-sub { color: #3db4f5; }

  .node.bao { top: 42%; left: 82%; }
  .node.bao .node-box { color: #f5a943; border-color: rgba(245,169,67,.5); background: rgba(245,169,67,.08); }
  .node.bao .node-sub { color: #f5a943; }

  .node.enduser { top: 78%; left: 18%; }
  .node.enduser .node-box { color: #2ecc7a; border-color: rgba(46,204,122,.5); background: rgba(46,204,122,.08); }
  .node.enduser .node-sub { color: #2ecc7a; }

  svg.arrows {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .badge {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    background: #0d1117;
    padding: 5px 16px;
    border-radius: 99px;
    white-space: nowrap;
    z-index: 10;
  }

  .badge.key {
    top: 20%;
    left: 82%;
    transform: translate(-50%, -50%);
    color: rgba(245,169,67,.6);
    border: 1.5px solid rgba(245,169,67,.25);
  }

  .badge.valid {
    top: 93%;
    left: 35%;
    transform: translate(-50%, -50%);
    color: rgba(46,204,122,.8);
    border: 1.5px solid rgba(46,204,122,.35);
  }

  .badge.tamper {
    top: 93%;
    left: 72%;
    transform: translate(-50%, -50%);
    color: rgba(224,92,92,.8);
    border: 1.5px solid rgba(224,92,92,.35);
  }

  /* Divider line between sign and verify lanes */
  .lane-divider {
    position: absolute;
    top: 50%;
    left: 5%;
    width: 55%;
    border-top: 1.5px dashed rgba(255,255,255,.06);
  }

  .lane-label {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(255,255,255,.1);
  }

  .lane-label.sign { top: 6%; left: 5%; }
  .lane-label.verify { top: 55%; left: 5%; }
</style>
</head>
<body>
<div class="slide">
  <div class="slide-title">Demo 5 · Transit Engine: Binary Signing in CI/CD</div>
  <div class="diagram">

    <div class="lane-divider"></div>
    <div class="lane-label sign">Sign</div>
    <div class="lane-label verify">Verify</div>

    <svg class="arrows" viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-blue" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(61,180,245,.5)"/>
        </marker>
        <marker id="arr-orange" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(245,169,67,.6)"/>
        </marker>
        <marker id="arr-green" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(46,204,122,.6)"/>
        </marker>
        <filter id="lbg" x="-20%" y="-40%" width="140%" height="180%">
          <feFlood flood-color="#0d1117" result="bg"/>
          <feMerge><feMergeNode in="bg"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- ═══ SIGN LANE ═══ -->

      <!-- 1. CI → SHA-256 hash → Bao -->
      <line x1="270" y1="95" x2="700" y2="195"
            stroke="rgba(61,180,245,.4)" stroke-width="2" marker-end="url(#arr-blue)"/>
      <text x="490" y="125" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(61,180,245,.5)" filter="url(#lbg)">SHA-256 hash</text>

      <!-- 2. Bao → signature → CI -->
      <line x1="700" y1="215" x2="270" y2="120"
            stroke="rgba(245,169,67,.5)" stroke-width="2" marker-end="url(#arr-orange)"/>
      <text x="490" y="190" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(245,169,67,.5)" filter="url(#lbg)">signature</text>

      <!-- ═══ HANDOFF ═══ -->

      <!-- 3. CI → binary + sig → End User (vertical down on left) -->
      <line x1="173" y1="132" x2="173" y2="370"
            stroke="rgba(46,204,122,.4)" stroke-width="2" marker-end="url(#arr-green)"/>
      <text x="153" y="260" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(46,204,122,.45)" transform="rotate(-90, 153, 260)" filter="url(#lbg)">binary + sig</text>

      <!-- ═══ VERIFY LANE ═══ -->

      <!-- 4. End User → verify → Bao -->
      <line x1="270" y1="400" x2="700" y2="230"
            stroke="rgba(46,204,122,.35)" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arr-green)"/>
      <text x="520" y="335" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(46,204,122,.45)" filter="url(#lbg)">verify signature</text>

      <!-- Step numbers -->
      <text x="490" y="112" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="12" fill="rgba(61,180,245,.3)" letter-spacing="1" filter="url(#lbg)">①</text>
      <text x="490" y="210" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="12" fill="rgba(245,169,67,.3)" letter-spacing="1" filter="url(#lbg)">②</text>
      <text x="130" y="260" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="12" fill="rgba(46,204,122,.3)" letter-spacing="1" filter="url(#lbg)">③</text>
      <text x="520" y="355" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="12" fill="rgba(46,204,122,.3)" letter-spacing="1" filter="url(#lbg)">④</text>
    </svg>

    <div class="node ci">
      <div class="node-box">CI Runner</div>
      <span class="node-sub">Build Pipeline</span>
    </div>

    <div class="node bao">
      <div class="node-box">OpenBao</div>
      <span class="node-sub">Transit Engine</span>
    </div>

    <div class="node enduser">
      <div class="node-box">End User</div>
      <span class="node-sub">Downloads Binary</span>
    </div>

    <div class="badge key">Private key never leaves</div>
    <div class="badge valid">✓ Signature Valid</div>
    <div class="badge tamper">✕ Tamper Detected</div>

  </div>
</div>
</body>
</html>
