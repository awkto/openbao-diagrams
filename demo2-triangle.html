<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 2 – Dynamic DB Credentials</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }

  .slide {
    width: 960px;
    padding: 44px 56px 52px;
  }

  .slide-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #3db4f5;
    margin-bottom: 40px;
  }

  .diagram {
    position: relative;
    width: 100%;
    height: 500px;
  }

  .node {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transform: translate(-50%, -50%);
  }

  .node-box {
    padding: 16px 30px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    border: 2px solid;
    white-space: nowrap;
    text-align: center;
  }

  .node-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    opacity: .55;
    text-transform: uppercase;
  }

  .node.app { top: 46%; left: 12%; }
  .node.app .node-box { color: #3db4f5; border-color: rgba(61,180,245,.5); background: rgba(61,180,245,.08); }
  .node.app .node-sub { color: #3db4f5; }

  .node.bao { top: 46%; left: 88%; }
  .node.bao .node-box { color: #f5a943; border-color: rgba(245,169,67,.5); background: rgba(245,169,67,.08); }
  .node.bao .node-sub { color: #f5a943; }

  .node.pg  { top: 90%; left: 50%; }
  .node.pg  .node-box { color: #2ecc7a; border-color: rgba(46,204,122,.5); background: rgba(46,204,122,.08); }
  .node.pg  .node-sub { color: #2ecc7a; }

  svg.arrows {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .lease-badge {
    position: absolute;
    top: 82%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: rgba(224,92,92,.8);
    background: #0d1117;
    border: 1.5px solid rgba(224,92,92,.35);
    padding: 5px 16px;
    border-radius: 99px;
    white-space: nowrap;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="slide-title">Demo 2 · Dynamic Database Credentials</div>
  <div class="diagram">

    <svg class="arrows" viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-blue" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="#2a5c80"/>
        </marker>
        <marker id="arr-green" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(46,204,122,.7)"/>
        </marker>
        <marker id="arr-red" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(224,92,92,.8)"/>
        </marker>
        <marker id="arr-blocked" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(224,92,92,.3)"/>
        </marker>
        <marker id="arr-new" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 z" fill="rgba(61,180,245,.6)"/>
        </marker>
        <filter id="lbg" x="-20%" y="-40%" width="140%" height="180%">
          <feFlood flood-color="#0d1117" result="bg"/>
          <feMerge><feMergeNode in="bg"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- 1. App → request creds → Bao -->
      <line x1="185" y1="216" x2="770" y2="216"
            stroke="#2a5c80" stroke-width="2" marker-end="url(#arr-blue)"/>
      <text x="480" y="204" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="#3a5a78" filter="url(#lbg)">request creds</text>

      <!-- 2. Bao → temp creds → App -->
      <line x1="770" y1="246" x2="185" y2="246"
            stroke="rgba(46,204,122,.6)" stroke-width="2" marker-end="url(#arr-green)"/>
      <text x="480" y="268" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(46,204,122,.6)" filter="url(#lbg)">temp creds</text>

      <!-- 3. App → connect → PG -->
      <line x1="155" y1="262" x2="420" y2="420"
            stroke="rgba(46,204,122,.5)" stroke-width="2" marker-end="url(#arr-green)"/>
      <text x="250" y="370" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(46,204,122,.55)" transform="rotate(-50, 250, 370)" filter="url(#lbg)">connect</text>

      <!-- Lease Expires divider -->
      <line x1="60" y1="395" x2="900" y2="395"
            stroke="rgba(224,92,92,.2)" stroke-width="1" stroke-dasharray="4 6"/>

      <!-- 4. Bao → revoke → PG -->
      <line x1="810" y1="262" x2="530" y2="420"
            stroke="rgba(224,92,92,.7)" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arr-red)"/>
      <text x="705" y="365" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(224,92,92,.7)" transform="rotate(50, 705, 365)" filter="url(#lbg)">revoke (DROP ROLE)</text>

      <!-- 5. App → blocked → PG -->
      <line x1="155" y1="270" x2="415" y2="428"
            stroke="rgba(224,92,92,.25)" stroke-width="2" stroke-dasharray="4 5" marker-end="url(#arr-blocked)"/>
      <text x="275" y="358" text-anchor="middle" font-family="Inter, sans-serif"
            font-size="22" fill="rgba(224,92,92,.7)" filter="url(#lbg)">✕</text>

      <!-- 6. App → request new creds → Bao -->
      <path d="M 185 265 Q 480 330 770 265"
            stroke="rgba(61,180,245,.5)" stroke-width="2" fill="none"
            stroke-dasharray="5 4" marker-end="url(#arr-new)"/>
      <text x="480" y="325" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="14" fill="rgba(61,180,245,.5)" filter="url(#lbg)">request new creds</text>

      <!-- Step label -->
      <text x="480" y="192" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="12" fill="#1e3a58" letter-spacing="1">① INITIAL REQUEST</text>
    </svg>

    <div class="node app">
      <div class="node-box">Web App</div>
      <span class="node-sub">AppRole Auth</span>
    </div>

    <div class="node bao">
      <div class="node-box">OpenBao</div>
      <span class="node-sub">Database Engine</span>
    </div>

    <div class="node pg">
      <div class="node-box">PostgreSQL</div>
    </div>

    <div class="lease-badge">⏱ Lease Expires</div>

  </div>
</div>
</body>
</html>
